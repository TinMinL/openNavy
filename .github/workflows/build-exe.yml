name: Build EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --clean --noconsole --onefile --add-data "wqy-microhei.ttc;." main.py --name openNavy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openNavy-exe
          path: dist/openNavy.exe
